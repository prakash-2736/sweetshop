version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: sweetshop-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7.0-alpine
    container_name: sweetshop-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sweetshop-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/sweetshop
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=production_sweet_shop_jwt_secret_key_99999
    depends_on:
      - mongo
      - redis

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: sweetshop-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:5000
    depends_on:
      - api

volumes:
  mongo-data:
  redis-data:
