name: SweetShop CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  audit-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Workspace Root Dependencies
      run: npm install

    - name: Install API Dependencies
      working-directory: ./apps/api
      run: npm install

    - name: Install Web Dependencies
      working-directory: ./apps/web
      run: npm install

    - name: Lint Frontend
      working-directory: ./apps/web
      run: npm run lint --if-present

    - name: Build Backend (Syntax Verification)
      working-directory: ./apps/api
      run: node --check src/server.js

    - name: Build Next.js Frontend
      working-directory: ./apps/web
      run: npm run build

  docker-build:
    needs: audit-and-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      run: docker build -t sweetshop-api:latest -f docker/Dockerfile.api .

    - name: Build Frontend Docker Image
      run: docker build -t sweetshop-web:latest -f docker/Dockerfile.web .
